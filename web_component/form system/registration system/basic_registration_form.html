<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>

    <link rel="stylesheet" href="./basic_registration_form.css">
    <link rel="stylesheet" href="./registration_root.css">

    <style>
        body {
            width: 98vw;
            height: 97vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>

<body>
    <div class="registration_container">
        <h2>Registration Form</h2>
        <div class="ipn_parent">
            <div>
                <label for="name_inp">Name :</label>
                <input type="text" name="name" id="name_inp">
            </div>
            <div>
                <label for="phone_inp">Mobile Number :</label>
                <input type="number" name="phone" id="phone_inp">
            </div>
            <div>
                <label for="mail_inp">Email :</label>
                <input type="email" name="mail" id="mail_inp">
            </div>
            <div>
                <label for="dob_inp">Date of Birth :</label>
                <input type="date" name="dob" id="dob_inp">
            </div>
            <div>
                <label for="password_inp">Password :</label>
                <input type="text" name="password" id="password_inp">
            </div>
            <div>
                <button>Reset</button>
                <button>Submit</button>
            </div>
        </div>

    </div>

    <script src="./basic_registration_form.js"></script>
</body>

</html>
